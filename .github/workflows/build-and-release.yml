name: Build and Release MistTray

on:
  push:
    tags: ['v*']
  workflow_dispatch:
    inputs:
      create_release:
        description: 'Create GitHub Release'
        required: false
        default: true
        type: boolean

# Required secrets:
#   CERTIFICATES_P12           - Developer ID Application certificate (base64 p12)
#   CERTIFICATES_P12_PASSWORD  - Password for the p12 certificate
#   TEAM_ID                    - Apple Developer Team ID
#   DEVELOPER_ID               - Developer ID common name (e.g. "Your Name (XXXXXXXXXX)")
#   APPLE_ID                   - Apple ID email for notarization
#   APP_SPECIFIC_PASSWORD      - App-specific password for notarization
#   HOMEBREW_APP_ID             - GitHub App ID (installed on DDVTECH/homebrew-mistserver)
#   HOMEBREW_APP_PRIVATE_KEY   - GitHub App private key (PEM)

env:
  XCODE_PROJECT: MistTray.xcodeproj
  XCODE_SCHEME: MistTray
  APP_NAME: MistTray

jobs:
  build-and-release:
    runs-on: macos-15

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: '16'

      - name: Import Code Signing Certificates
        uses: apple-actions/import-codesign-certs@v2
        with:
          p12-file-base64: ${{ secrets.CERTIFICATES_P12 }}
          p12-password: ${{ secrets.CERTIFICATES_P12_PASSWORD }}

      - name: Set Version from Tag
        run: |
          if [[ "$GITHUB_REF" == refs/tags/v* ]]; then
            VERSION=${GITHUB_REF#refs/tags/v}
            echo "Setting app version to $VERSION"
            xcrun agvtool new-marketing-version "$VERSION"
            xcrun agvtool new-version -all "$VERSION"
          fi

      - name: Build Archive
        run: |
          xcodebuild -project "$XCODE_PROJECT" \
                     -scheme "$XCODE_SCHEME" \
                     -configuration Release \
                     -archivePath "$RUNNER_TEMP/$APP_NAME.xcarchive" \
                     archive

      - name: Export App
        run: |
          cat > "$RUNNER_TEMP/exportOptions.plist" << EOF
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
              <key>method</key>
              <string>developer-id</string>
              <key>signingStyle</key>
              <string>manual</string>
              <key>teamID</key>
              <string>${{ secrets.TEAM_ID }}</string>
              <key>signingCertificate</key>
              <string>Developer ID Application</string>
              <key>provisioningProfiles</key>
              <dict/>
          </dict>
          </plist>
          EOF

          xcodebuild -exportArchive \
                     -archivePath "$RUNNER_TEMP/$APP_NAME.xcarchive" \
                     -exportPath "$RUNNER_TEMP" \
                     -exportOptionsPlist "$RUNNER_TEMP/exportOptions.plist"

      - name: Verify Codesign
        run: |
          codesign --verify --verbose=2 "$RUNNER_TEMP/$APP_NAME.app"

      - name: Create ZIP for Notarization
        run: |
          cd "$RUNNER_TEMP"
          ditto -c -k --keepParent "$APP_NAME.app" "$APP_NAME-temp.zip"

      - name: Notarize App
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APP_SPECIFIC_PASSWORD: ${{ secrets.APP_SPECIFIC_PASSWORD }}
          TEAM_ID: ${{ secrets.TEAM_ID }}
        run: |
          xcrun notarytool submit "$RUNNER_TEMP/$APP_NAME-temp.zip" \
                                  --apple-id "$APPLE_ID" \
                                  --password "$APP_SPECIFIC_PASSWORD" \
                                  --team-id "$TEAM_ID" \
                                  --wait

          xcrun stapler staple "$RUNNER_TEMP/$APP_NAME.app"
          xcrun stapler validate "$RUNNER_TEMP/$APP_NAME.app"

      - name: Verify Gatekeeper
        run: |
          spctl -a -vvv "$RUNNER_TEMP/$APP_NAME.app"

      - name: Create Distribution Packages
        run: |
          cd "$RUNNER_TEMP"

          if [[ "$GITHUB_REF" == refs/tags/* ]]; then
            VERSION=${GITHUB_REF#refs/tags/}
          else
            VERSION="dev-$(date +%Y%m%d-%H%M%S)"
          fi

          echo "VERSION=$VERSION" >> $GITHUB_ENV

          # ZIP for Homebrew cask
          ditto -c -k --keepParent "$APP_NAME.app" "$APP_NAME-$VERSION.zip"

          # DMG for direct download
          mkdir dmg_temp
          cp -R "$APP_NAME.app" dmg_temp/
          ln -s /Applications dmg_temp/Applications
          hdiutil create -volname "$APP_NAME" \
                         -srcfolder dmg_temp \
                         -ov -format UDZO \
                         -imagekey zlib-level=9 \
                         "$APP_NAME-$VERSION.dmg"

          shasum -a 256 "$APP_NAME-$VERSION.zip" > "$APP_NAME-$VERSION.zip.sha256"
          shasum -a 256 "$APP_NAME-$VERSION.dmg" > "$APP_NAME-$VERSION.dmg.sha256"

          ls -la *.zip *.dmg *.sha256

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/') || github.event.inputs.create_release == 'true'
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ env.VERSION }}
          name: MistTray ${{ env.VERSION }}
          draft: false
          prerelease: ${{ contains(env.VERSION, 'beta') || contains(env.VERSION, 'alpha') || contains(env.VERSION, 'dev') }}
          generate_release_notes: true
          files: |
            ${{ runner.temp }}/MistTray-${{ env.VERSION }}.zip
            ${{ runner.temp }}/MistTray-${{ env.VERSION }}.dmg
            ${{ runner.temp }}/MistTray-${{ env.VERSION }}.zip.sha256
            ${{ runner.temp }}/MistTray-${{ env.VERSION }}.dmg.sha256
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate GitHub App token
        if: startsWith(github.ref, 'refs/tags/')
        id: app-token
        uses: actions/create-github-app-token@v1
        with:
          app-id: ${{ secrets.HOMEBREW_APP_ID }}
          private-key: ${{ secrets.HOMEBREW_APP_PRIVATE_KEY }}
          owner: DDVTECH
          repositories: homebrew-mistserver

      - name: Update Homebrew cask
        if: startsWith(github.ref, 'refs/tags/')
        run: |
          SHA256=$(awk '{print $1}' "$RUNNER_TEMP/$APP_NAME-$VERSION.zip.sha256")
          CLEAN_VERSION=${VERSION#v}

          git clone --depth 1 https://x-access-token:${{ steps.app-token.outputs.token }}@github.com/DDVTECH/homebrew-mistserver.git "$RUNNER_TEMP/homebrew-tap"
          cd "$RUNNER_TEMP/homebrew-tap"

          sed -i '' -E "s|^  version \".*\"|  version \"$CLEAN_VERSION\"|" Casks/misttray.rb
          sed -i '' -E "s|^  sha256 \".*\"|  sha256 \"$SHA256\"|" Casks/misttray.rb

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          if [ -n "$(git diff)" ]; then
            git add Casks/misttray.rb
            git commit -m "Update MistTray to v$CLEAN_VERSION"
            git push origin HEAD:main
            echo "Updated Homebrew cask to v$CLEAN_VERSION (sha256: $SHA256)"
          else
            echo "Homebrew cask already up-to-date."
          fi

      - name: Cleanup
        if: always()
        run: |
          rm -f "$RUNNER_TEMP/build_certificate.p12"
          rm -f "$RUNNER_TEMP/exportOptions.plist"
